name: Affinity
description: >-
  Affinity is a relationship intelligence CRM built for private equity, venture
  capital, and investment banking teams. It provides a REST API that enables
  developers to manage contacts, organizations, opportunities, lists, notes, and
  relationship timelines derived from email and calendar activity. The API is
  available in two versions: a legacy V1 with full read/write capabilities for
  persons, companies, opportunities, notes, interactions, reminders, and webhooks,
  and a modern V2 RESTful interface designed for internal apps, automated
  workflows, and third-party integrations. API access is included in the Scale,
  Advanced, and Enterprise subscription tiers, with monthly call limits ranging
  from 100,000 to unlimited depending on the plan.
