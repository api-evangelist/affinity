apis:
  - name: Affinity API V1
    description: >-
      The legacy Affinity V1 API provides comprehensive read and write access to
      core CRM data including persons, organizations, opportunities, lists, notes,
      interactions, reminders, and webhooks. It uses HTTP Basic Auth or Bearer
      Auth with an API key obtained from the Affinity Settings dashboard.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://api-docs.affinity.co/
    baseURL: https://api.affinity.co
    tags:
      - CRM
      - Contacts
      - Organizations
      - Opportunities
      - Notes
      - Webhooks
    properties:
      - type: Documentation
        url: https://api-docs.affinity.co/
  - name: Affinity API V2
    description: >-
      The modern Affinity V2 API is a RESTful interface for building internal
      apps, automated workflows, and third-party integrations. It supports
      reading and writing data about people, companies, and opportunities, with
      Bearer Auth authentication. While not yet at full feature parity with V1,
      it is the actively developed version and includes a hosted MCP server
      integration for AI-powered workflows.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.affinity.co/
    baseURL: https://api.affinity.co
    tags:
      - CRM
