  /v2/opportunities/{opportunityId}/notes:
    get:
      x-stability-level: beta
      description: '| ⚠️  This endpoint is currently in BETA |

        |--|


        Returns Notes for a given Opportunity which includes directly attached notes and those attached to persons on this Opportunity.


        You can filter notes using the `filter` query parameter. The filter parameter is a string that you can specify conditions based on the following properties.

        | **Property Name**           | **Description**                                                 | **Type**   | **Allowed Operators**                | **Examples**                    |

        |-----------------------------|-----------------------------------------------------------------|------------|--------------------------------------|---------------------------------|

        | `creator.id`                | Filter notes by the creator of the note                         | `int32`    | `=`                                  | `creator.id=1`                  |

        | `createdAt`                 | Filter notes by when it was created                             | `datetime` | `>`, `<`, `>=`, `<=`                 | `createdAt<2025-02-04T10:48:24Z` |

        | `updatedAt`                 | Filter notes by when it was updated                             | `datetime` | `>`, `<`, `>=`, `<=`                 | `updatedAt>=2025-02-03T10:48:24Z`|

        '
      summary: Get Notes for an Opportunity
      operationId: v2_opportunities_opportunityId_notes__GET
      tags:
      - opportunities
      parameters:
      - name: opportunityId
        description: Opportunity ID
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
          maximum: 9223372036854776000
      - name: filter
        description: Filter options
        in: query
        schema:
          type: string
      - name: cursor
        description: Cursor for the next or previous page
        in: query
        schema:
          type: string
      - name: limit
        description: Number of items to include in the page
        in: query
        schema:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          default: 20
      - name: totalCount
        description: Include total count of the collection in the pagination response
        in: query
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notes.NotesPaged'
              examples:
                entities:
                  $ref: '#/components/examples/entities-3'
                interaction:
                  $ref: '#/components/examples/interaction-4'
                ai-notetaker:
                  $ref: '#/components/examples/ai-notetaker-3'
          headers:
            X-Ratelimit-Limit-User:
              $ref: '#/components/headers/X-Ratelimit-Limit-User'
            X-Ratelimit-Limit-User-Remaining:
              $ref: '#/components/headers/X-Ratelimit-Limit-User-Remaining'
            X-Ratelimit-Limit-User-Reset:
